version: "3"

services:
  nmap-mcp:
    build:
      context: .
      network: host
    image: nmap-mcp:latest
    environment:
      - HOST:0.0.0.0
    cpus: 0.5
    mem_limit: 512mb
    network_mode: host
    user: 1000:1000
    cap_add:
      - NET_ADMIN
      - NET_RAW 
    security_opt:
      - 'no-new-privileges:true'
    privileged: false

